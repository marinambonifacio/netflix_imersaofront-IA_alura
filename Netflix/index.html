<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Netflix</title>
    <link rel="icon" type="image/x-icon" href="assets/netflix.png" />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <main>
      <header>
        <h1>Quem está assistindo?</h1>
        <button id="theme-toggle" type="button" aria-label="Ativar modo claro">
          Modo claro
        </button>
      </header>

      <section class="profiles" aria-label="Perfis de usuário">
        <ul>
          <li>
            <article class="profile">
              <figure>
                <img
                  src="assets/Fabiana.png"
                  alt="Avatar em estilo de animação 3D de uma moça sorridente com cabelo cacheado e pele retinta sobre um fundo azul cobalto sólido"
                />
                <figcaption>Fabiana</figcaption>
              </figure>
            </article>
          </li>
          <li>
            <article class="profile">
              <figure>
                <img
                  src="assets/Ana.png"
                  alt="Ilustração colorida em estilo de desenho animado antigo de uma raposa antropomórfica sorridente, usando boné azul e gravata borboleta vermelha, acenando alegremente sobre um fundo amarelo."
                />
                <figcaption>Ana</figcaption>
              </figure>
            </article>
          </li>
          <li>
            <article class="profile">
              <figure>
                <img
                  src="assets/Marina.png"
                  alt="Ilustração de uma raposa laranja sorridente em estilo de animação, com traços limpos e expressivos, sobre um fundo roxo sólido."
                />
                <figcaption>Marina</figcaption>
              </figure>
            </article>
          </li>
          <li>
            <article class="profile">
              <figure>
                <img
                  src="assets/Genilson.png"
                  alt="Ilustração de uma bicicleta clássica voltada para a esquerda, com detalhes realistas e traços de desenho animado sobre um fundo turquesa escuro."
                />
                <figcaption>Genilson</figcaption>
              </figure>
            </article>
          </li>
        </ul>
      </section>
    </main>
    <script src="script.js"></script>
  </body>
</html>
